apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: barsuf
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: barsuf-backend:latest
          imagePullPolicy: Never # Change this if using a real container registry
          ports:
            - containerPort: 3001
          env:
            - name: OLLAMA_BASE_URL
              value: "http://ollama-service:11434"
          volumeMounts:
            - name: barsuf-data
              mountPath: /app/server/data
      volumes:
        - name: barsuf-data
          persistentVolumeClaim:
            claimName: barsuf-data-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: barsuf
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 3001
      targetPort: 3001
