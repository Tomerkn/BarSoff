apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: barsuf
  labels:
    app: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
          resources:
            requests:
              memory: "8Gi"
              cpu: "2"
            limits:
              memory: "16Gi"
              cpu: "4"
          # Init container could be used to pre-pull llama3, but it's simpler to do it manually once or use an init script
          lifecycle:
            postStart:
              exec:
                command: ["/bin/sh", "-c", "sleep 10 && ollama pull llama3"]
      volumes:
        - name: ollama-data
          persistentVolumeClaim:
            claimName: ollama-data-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: ollama-service
  namespace: barsuf
spec:
  selector:
    app: ollama
  ports:
    - protocol: TCP
      port: 11434
      targetPort: 11434
