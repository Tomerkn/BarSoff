apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: barsuf
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: barsuf-frontend:latest
          imagePullPolicy: Never # Change this if using a real container registry
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: barsuf
spec:
  type: NodePort # Use NodePort for local clusters, LoadBalancer for real cloud
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080
