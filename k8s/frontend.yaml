apiVersion: apps/v1 # גרסת ה-API של קוברנטיס
kind: Deployment # סוג האובייקט - פריסה של אפליקציה
metadata:
  name: frontend # שם הפריסה
  namespace: barsuf # מרחב השמות של הפרויקט
  labels:
    app: frontend # תגיות לזיהוי
spec:
  replicas: 1 # כמה עותקים להריץ (כרגע אחד מספיק)
  selector:
    matchLabels:
      app: frontend # איך למצוא את העותקים ששייכים לפריסה הזו
  template:
    metadata:
      labels:
        app: frontend # תגיות שיוצמדו לכל עותק (Pod) שיווצר
    spec:
      containers:
        - name: frontend # שם המכולה
          image: barsuf-frontend:latest # התמונה של קוד האתר
          imagePullPolicy: Never # לא לנסות להוריד מהאינטרנט, להשתמש במה שיש במחשב
          ports:
            - containerPort: 80 # האפליקציה בתוך המכולה מאזינה לפורט 80

---
apiVersion: v1 # גרסת ה-API
kind: Service # סוג האובייקט - שירות שמאפשר גישה לאפליקציה
metadata:
  name: frontend-service # שם השירות
  namespace: barsuf # מרחב השמות
spec:
  type: NodePort # מאפשר גישה מהמחשב המקומי (לסביבת ענן אמיתית משתמשים ב-LoadBalancer)
  selector:
    app: frontend # לאיזה עותקים לשלוח את התעבורה
  ports:
    - protocol: TCP # פרוטוקול תקשורת
      port: 80 # הפורט של השירות
      targetPort: 80 # לאיזה פורט בתוך המכולה להפנות
      nodePort: 30080 # הפורט שדרכו ניכנס לאתר מהדפדפן במחשב המקומי
