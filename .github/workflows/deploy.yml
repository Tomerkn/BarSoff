name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # עדכון ל-Node.js 24 לפני שיהפוך לברירת מחדל

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |-
          gcloud run deploy barsuf \
            --source . \
            --region europe-west1 \
            --platform managed \
            --allow-unauthenticated \
            --quiet
