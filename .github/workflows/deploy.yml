name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authorize Docker
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev

      - name: Build and Push Container
        run: |-
          docker build -t europe-west1-docker.pkg.dev/project-e7b25b42-8e43-4df1-8ce/cloud-run-source-deploy/barsuf:${{ github.sha }} .
          docker push europe-west1-docker.pkg.dev/project-e7b25b42-8e43-4df1-8ce/cloud-run-source-deploy/barsuf:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |-
          gcloud run deploy barsuf \
            --image europe-west1-docker.pkg.dev/project-e7b25b42-8e43-4df1-8ce/cloud-run-source-deploy/barsuf:${{ github.sha }} \
            --region europe-west1 \
            --platform managed \
            --allow-unauthenticated
